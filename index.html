<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задание для тебя ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      animation: show 0.8s ease;
    }

    @keyframes show {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 14px 25px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4f7b;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      background: #fff0f5;
    }

    .hidden {
      display: none;
    }

    .love {
      font-size: 42px;
      font-weight: 900;
      animation: pulse 1s infinite;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 24px;
      animation: fly 5s linear infinite;
      opacity: 0.8;
    }

    @keyframes fly {
      from {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card" id="step1">
    <h1>Привет, любимая 💌</h1>
    <p>У меня для тебя есть маленькое задание.</p>
    <button onclick="nextStep(1)">Начать</button>
  </div>

  <div class="card hidden" id="step2">
    <h1>Задание №1 🌸</h1>
    <p>Улыбнись прямо сейчас. Да-да, я вижу 😁</p>
    <button onclick="nextStep(2)">Я улыбнулась</button>
  </div>

  <div class="card hidden" id="step3">
    <h1>Задание №2 ❤️</h1>
    <p>Вспомни, что ты самая красивая, милая и особенная.</p>
    <button onclick="nextStep(3)">Вспомнила</button>
  </div>

  <div class="card hidden" id="step4">
    <h1>Последнее задание ✨</h1>
    <p>Нажми на кнопку и узнай самое главное.</p>
    <button onclick="nextStep(4)">Узнать</button>
  </div>

  <div class="card hidden" id="final">
    <div class="love">Я люблю тебя ❤️</div>
    <p>Ты самое лучшее, что есть в моей жизни.</p>
  </div>

  <script>
    function nextStep(step) {
      document.getElementById("step" + step).classList.add("hidden");

      if (step < 4) {
        document.getElementById("step" + (step + 1)).classList.remove("hidden");
      } else {
        document.getElementById("final").classList.remove("hidden");
        startHearts();
      }
    }

    function startHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        heart.style.animationDuration = Math.random() * 3 + 3 + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 6000);
      }, 250);
    }
  </script>

</body>
</html>
